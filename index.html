<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
    overflow:hidden;
}

.container{
    width:420px;
    background:#fff;
    padding:35px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
    animation:fadeIn 0.8s ease;
}

.container h1{
    text-align:center;
    margin-bottom:25px;
    color:#333;
}

.input-group{
    margin-bottom:15px;
}

.input-group input{
    width:100%;
    padding:14px;
    border:1px solid #ddd;
    border-radius:10px;
    outline:none;
    font-size:15px;
}

.input-group input:focus{
    border-color:#667eea;
}

.register-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#667eea;
    color:#fff;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.register-btn:hover{
    background:#5563d6;
}

.note{
    text-align:center;
    margin-top:15px;
    color:#666;
    font-size:14px;
}

#welcomePage{
    display:none;
    text-align:center;
    color:white;
    animation:zoomIn 1s ease;
}

#welcomePage h1{
    font-size:60px;
    margin-bottom:15px;
}

#welcomePage p{
    font-size:24px;
    margin-bottom:25px;
}

.home-btn{
    padding:14px 30px;
    border:none;
    border-radius:10px;
    background:white;
    color:#667eea;
    font-size:16px;
    cursor:pointer;
    font-weight:bold;
}

.home-btn:hover{
    transform:scale(1.05);
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes zoomIn{
    from{
        opacity:0;
        transform:scale(0.5);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}
</style>
</head>
<body>

<!-- REGISTER PAGE -->

<div class="container" id="registerPage">

    <h1>Create Account</h1>

    <div class="input-group">
        <input type="text" placeholder="Full Name">
    </div>

    <div class="input-group">
        <input type="email" placeholder="Email Address">
    </div>

    <div class="input-group">
        <input type="text" placeholder="Username">
    </div>

    <div class="input-group">
        <input type="password" placeholder="Password">
    </div>

    <div class="input-group">
        <input type="password" placeholder="Confirm Password">
    </div>

    <button class="register-btn" onclick="registerUser()">
        Register Now
    </button>

    <div class="note">
        Welcome to our registration portal
    </div>

</div>

<!-- WELCOME PAGE -->

<div id="welcomePage">

    <h1>🎉 Welcome To Our World 🎉</h1>

    <p>Your Registration Has Been Completed Successfully</p>

    <button class="home-btn" onclick="goBack()">
        Back To Register
    </button>

</div>

<script>

function registerUser(){

    document.getElementById("registerPage").style.display = "none";
    document.getElementById("welcomePage").style.display = "block";

}

function goBack(){

    document.getElementById("welcomePage").style.display = "none";
    document.getElementById("registerPage").style.display = "block";

}

</script>

</body>
</html>
