<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register & Login Demo</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:400px;
    background:#fff;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.title{
    text-align:center;
    margin-bottom:20px;
}

.tabs{
    display:flex;
    margin-bottom:20px;
}

.tabs button{
    flex:1;
    padding:12px;
    border:none;
    cursor:pointer;
    background:#eaeaea;
    font-size:16px;
}

.tabs button.active{
    background:#007bff;
    color:white;
}

.form{
    display:none;
}

.form.active{
    display:block;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:8px;
}

.submit-btn{
    width:100%;
    padding:12px;
    border:none;
    background:#007bff;
    color:white;
    border-radius:8px;
    cursor:pointer;
    margin-top:10px;
    font-size:16px;
}

.submit-btn:hover{
    background:#0056b3;
}

#welcomePage{
    display:none;
    text-align:center;
    color:white;
}

#welcomePage h1{
    font-size:50px;
    margin-bottom:20px;
}

#welcomePage p{
    font-size:22px;
}

.home-btn{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:white;
    color:#007bff;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container" id="authPage">

    <h2 class="title">Welcome</h2>

    <div class="tabs">
        <button id="loginTab" class="active" onclick="showLogin()">Login</button>
        <button id="registerTab" onclick="showRegister()">Register</button>
    </div>

    <!-- Login Form -->
    <div id="loginForm" class="form active">
        <input type="text" placeholder="Username">
        <input type="password" placeholder="Password">

        <button class="submit-btn" onclick="openWelcome()">
            Login
        </button>
    </div>

    <!-- Register Form -->
    <div id="registerForm" class="form">
        <input type="text" placeholder="Full Name">
        <input type="email" placeholder="Email">
        <input type="text" placeholder="Username">
        <input type="password" placeholder="Password">
        <input type="password" placeholder="Confirm Password">

        <button class="submit-btn" onclick="openWelcome()">
            Register
        </button>
    </div>

</div>

<div id="welcomePage">
    <h1>🎉 Welcome To Our World 🎉</h1>
    <p>Successfully Entered</p>

    <button class="home-btn" onclick="goBack()">
        Back
    </button>
</div>

<script>

function showLogin(){
    document.getElementById("loginForm").classList.add("active");
    document.getElementById("registerForm").classList.remove("active");

    document.getElementById("loginTab").classList.add("active");
    document.getElementById("registerTab").classList.remove("active");
}

function showRegister(){
    document.getElementById("registerForm").classList.add("active");
    document.getElementById("loginForm").classList.remove("active");

    document.getElementById("registerTab").classList.add("active");
    document.getElementById("loginTab").classList.remove("active");
}

function openWelcome(){
    document.getElementById("authPage").style.display="none";
    document.getElementById("welcomePage").style.display="block";
}

function goBack(){
    document.getElementById("welcomePage").style.display="none";
    document.getElementById("authPage").style.display="block";
}

</script>

</body>
</html>
